<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio of a web developer showcasing projects and skills">
  <title>Your Name | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      scroll-behavior: smooth;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background: #121212;
      color: white;
    }

    header {
      background: #111;
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    nav {
      background: #222;
      text-align: center;
      padding: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: white;
      margin: 0 20px;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s;
      font-weight: 500;
    }

    nav a:hover {
      color: #00adb5;
      text-decoration: underline;
    }

    section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    section h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      border-bottom: 3px solid #00adb5;
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #f4f4f4;
      padding: 1.5rem;
      border-radius: 8px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    body.dark .card {
      background: #1e1e1e;
      box-shadow: 0 2px 8px rgba(255, 255, 255, 0.1);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    body.dark .card:hover {
      box-shadow: 0 6px 16px rgba(255, 255, 255, 0.2);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
    }

    .btn {
      background: #00adb5;
      color: white;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      font-size: 1rem;
      transition: background-color 0.3s;
    }

    .btn:hover {
      background: #0088a0;
    }

    .btn:focus {
      outline: 2px solid #00adb5;
      outline-offset: 2px;
    }

    @media (max-width: 768px) {
      section {
        padding: 2rem 1rem;
      }
      nav a {
        margin: 0 10px;
      }
      header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>Your Name</h1>
    <p>Web Developer 🚀</p>
    <button class="btn" id="darkModeToggle">Toggle Dark Mode</button>
  </header>

  <nav>
    <a href="#about" class="nav-link">About</a>
    <a href="#projects" class="nav-link">Projects</a>
    <a href="#contact" class="nav-link">Contact</a>
  </nav>

  <section id="about">
    <h2>About Me</h2>
    <p>I build websites and love coding.</p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <div class="projects">
      <div class="card">
        <h3>Project 1</h3>
        <p>My first project.</p>
      </div>

      <div class="card">
        <h3>Project 2</h3>
        <p>My second project.</p>
      </div>
    </div>
  </section>

  <section id="contact">
    <h2>Contact</h2>
    <p>Email: <a href="mailto:your@email.com">your@email.com</a></p>
  </section>

  <footer>
    <p>&copy; 2026 Your Name</p>
  </footer>

  <script>
    const darkModeToggle = document.getElementById('darkModeToggle');
    const navLinks = document.querySelectorAll('.nav-link');

    // Initialize dark mode from localStorage
    if (localStorage.getItem('darkMode') === 'enabled') {
      document.body.classList.add('dark');
    }

    // Dark mode toggle with persistence
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    });

    // Smooth navigation with proper hash handling
    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href').substring(1);
        const targetSection = document.getElementById(targetId);
        if (targetSection) {
          targetSection.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>

</body>
</html>
